name: Test

on:
  workflow_call:
    inputs:
      python-versions:
        required: true
        type: string
        description: JSON array of Python versions to test (e.g. '["3.12","3.13"]')

jobs:
  test:
    if: ${{ inputs.python-versions != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbcommon-x11-0 libglu1-mesa libxcb-xinerama0

      - name: Install project
        run: |
          python -m pip install -U pip
          pip install -e ".[test]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          QT_OPENGL: software
          PYDM_DEFAULT_PROTOCOL: fake
          MPLBACKEND: Agg
          PIP_DISABLE_PIP_VERSION_CHECK: 1
          PYTEST_ADDOPTS: -vv -ra --durations=10 --tb=long -l
          COVERAGE_FILE: .coverage.${{ matrix.python-version }}
        run: |
          xvfb-run -a pytest \
            --cov=sc_linac_physics \
            --cov-branch \
            --cov-report=xml \
            --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7
